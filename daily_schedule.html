<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kundalik Reja</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .container {
            max-width: 1200px;
            margin-top: 20px;
            margin-bottom: 20px;
        }
        .card {
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border: none;
            margin-bottom: 20px;
        }
        .card-header {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            border-radius: 15px 15px 0 0 !important;
            font-weight: bold;
        }
        .day-card {
            transition: all 0.3s ease;
        }
        .day-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.15);
        }
        .task-item {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 8px;
            border-left: 4px solid #667eea;
            transition: all 0.3s ease;
        }
        .task-item:hover {
            background: #e9ecef;
            transform: translateX(5px);
        }
        .task-item.completed {
            background: #d4edda;
            border-left-color: #28a745;
            opacity: 0.8;
        }
        .task-item.completed .task-text {
            text-decoration: line-through;
            color: #6c757d;
        }
        .time-badge {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            padding: 4px 8px;
            border-radius: 15px;
            font-size: 0.85rem;
            font-weight: bold;
        }
        .progress-bar {
            background: linear-gradient(45deg, #28a745, #20c997);
        }
        .stats-card {
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            text-align: center;
            margin-bottom: 15px;
        }
        .stats-number {
            font-size: 2rem;
            font-weight: bold;
            color: #667eea;
        }
        .nav-pills .nav-link {
            border-radius: 25px;
            margin: 0 5px;
            transition: all 0.3s ease;
        }
        .nav-pills .nav-link.active {
            background: linear-gradient(45deg, #667eea, #764ba2);
        }
        .btn-reset {
            background: linear-gradient(45deg, #dc3545, #c82333);
            border: none;
            border-radius: 25px;
            color: white;
        }
        .week-progress {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        .custom-checkbox {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }
        @media (max-width: 768px) {
            .container {
                padding: 10px;
            }
            .stats-card {
                margin-bottom: 10px;
            }
        }
    </style>
</head>

            sunday: {
                title: "Yakshanba Rejasi (Dam olish kuni)",
                tasks: [
                    { time: "04:20", task: "Uyg'onish", duration: 0 },

        // Task completion tracking
        let taskCompletion = {};

        // Initialize task completion for all days
        function initializeTaskCompletion() {
            Object.keys(weeklySchedule).forEach(day => {
                taskCompletion[day] = {};
                weeklySchedule[day].tasks.forEach((task, index) => {
                    taskCompletion[day][index] = false;
                });
            });
        }

        // Load saved data from localStorage
        function loadData() {
            const saved = localStorage.getItem('taskCompletion');
            if (saved) {
                taskCompletion = JSON.parse(saved);
            } else {
                initializeTaskCompletion();
            }
        }

        // Save data to localStorage
        function saveData() {
            localStorage.setItem('taskCompletion', JSON.stringify(taskCompletion));
        }

        // Render schedule for specific day
        function renderSchedule(day) {
            const schedule = weeklySchedule[day];
            const content = document.getElementById('scheduleContent');
            const title = document.getElementById('dayTitle');
            
            title.innerHTML = `<i class="fas fa-clock"></i> ${schedule.title}`;
            content.innerHTML = '';
            
            schedule.tasks.forEach((task, index) => {
                const taskDiv = document.createElement('div');
                taskDiv.className = `task-item ${taskCompletion[day][index] ? 'completed' : ''}`;
                taskDiv.innerHTML = `
                    <div class="d-flex align-items-center">
                        <input type="checkbox" class="form-check-input custom-checkbox me-3" 
                               ${taskCompletion[day][index] ? 'checked' : ''} 
                               onchange="toggleTask('${day}', ${index})">
                        <div class="flex-grow-1">
                            <span class="task-text">${task.task}</span>
                            ${task.duration > 0 ? `<small class="text-muted ms-2">(${task.duration} daqiqa)</small>` : ''}
                        </div>
                        <span class="time-badge">${task.time}</span>
                    </div>
                `;
                content.appendChild(taskDiv);
            });
            
            updateDayProgress(day);
        }

        // Toggle task completion
        function toggleTask(day, taskIndex) {
            taskCompletion[day][taskIndex] = !taskCompletion[day][taskIndex];
            saveData();
            renderSchedule(day);
            updateWeekProgress();
        }

        // Update day progress
        function updateDayProgress(day) {
            const tasks = weeklySchedule[day].tasks;
            const completed = tasks.filter((_, index) => taskCompletion[day][index]).length;
            const total = tasks.length;
            const percentage = total > 0 ? Math.round((completed / total) * 100) : 0;
            
            document.getElementById('dayProgress').textContent = `${percentage}%`;
            document.getElementById('currentDayProgress').textContent = `${percentage}%`;
        }

        // Update week progress
        function updateWeekProgress() {
            let totalTasks = 0;
            let completedTasks = 0;
            
            Object.keys(weeklySchedule).forEach(day => {
                const tasks = weeklySchedule[day].tasks;
                totalTasks += tasks.length;
                completedTasks += tasks.filter((_, index) => taskCompletion[day][index]).length;
            });
            
            const percentage = totalTasks > 0 ? Math.round((completedTasks / totalTasks) * 100) : 0;
            
            document.getElementById('totalTasks').textContent = totalTasks;
            document.getElementById('completedTasks').textContent = completedTasks;
            document.getElementById('weekPercentage').textContent = `${percentage}%`;
            
            const progressBar = document.getElementById('weekProgressBar');
            progressBar.style.width = `${percentage}%`;
            progressBar.textContent = `${percentage}%`;
        }

        // Reset current day
        function resetDay() {
            const activeTab = document.querySelector('.nav-link.active').dataset.day;
            if (confirm(`${weeklySchedule[activeTab].title} ni qayta boshlashni hohlaysizmi?`)) {
                weeklySchedule[activeTab].tasks.forEach((_, index) => {
                    taskCompletion[activeTab][index] = false;
                });
                saveData();
                renderSchedule(activeTab);
                updateWeekProgress();
            }
        }

        // Tab switching
        document.getElementById('dayTabs').addEventListener('click', function(e) {
            e.preventDefault();
            if (e.target.classList.contains('nav-link')) {
                document.querySelectorAll('.nav-link').forEach(link => link.classList.remove('active'));
                e.target.classList.add('active');
                const day = e.target.dataset.day;
                renderSchedule(day);
            }
        });

        // Initialize app
        document.addEventListener('DOMContentLoaded', function() {
            loadData();
            renderSchedule('monday');
            updateWeekProgress();
        });
    </script>
</body>
